<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5-Day Lean Bulk Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #0a0a0b; --surface: #111114; --card: #16161a; --border: #2a2a32;
    --accent: #c8f135; --accent2: #4af0b4; --text: #e8e8ec; --muted: #6b6b7a; --red: #ff5757;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
  .container { max-width: 780px; margin: 0 auto; }

  header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; background: var(--accent); color: #0a0a0b; padding: 3px 10px; border-radius: 2px; margin-bottom: 12px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 10vw, 80px); line-height: 0.9; color: var(--text); margin-bottom: 14px; }
  h1 span { color: var(--accent); }

  /* =========================
     BODYWEIGHT TRACKER (NEW)
  ========================== */
  .tracker {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .tracker h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    margin-bottom: 10px;
    color: var(--accent);
    font-size: 28px;
  }
  .tracker-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .tracker input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .tracker button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0a0a0b;
    font-weight: 700;
    cursor: pointer;
  }
  .tracker ul {
    list-style: none;
    margin-top: 10px;
    max-height: 160px;
    overflow-y: auto;
  }
  .tracker li {
    font-size: 13px;
    color: var(--muted);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  /* ===== your existing styles stay unchanged ===== */

  .edit-hint { display: flex; align-items: center; gap: 8px; background: #c8f13510; border: 1px solid #c8f13530; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .edit-hint svg { color: var(--accent); flex-shrink: 0; }

  /* (rest of your original CSS unchanged — kept intact below) */
</style>
</head>

<body>
<div class="container">

<header>
  <div class="tag">Lean Bulk · Editable</div>
  <h1>5-DAY<br/><span>LEAN</span><br/>SPLIT</h1>
</header>

<!-- =========================
     BODYWEIGHT TRACKER (NEW)
========================= -->
<div class="tracker">
  <h2>Bodyweight Tracker</h2>

  <div class="tracker-row">
    <input type="number" id="bwInput" placeholder="Enter bodyweight (lb)">
    <button onclick="addWeight()">Add</button>
  </div>

  <ul id="bwList"></ul>
</div>

<div class="edit-hint">
  Tap any <strong style="color:var(--accent)">&nbsp;weight&nbsp;</strong> to edit it — changes save automatically.
</div>

<!-- =========================
     YOUR ORIGINAL CONTENT
     (UNCHANGED BELOW)
========================= -->

<!-- DAY 1 -->
<div class="day-card open" id="d1">
  <div class="day-header" onclick="toggle('d1')">
    <div class="day-num">01</div>
    <div class="day-info"><div class="day-name">Chest + Triceps</div><div class="day-sub">Push · ~60 min</div></div>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="day-body">
    <!-- (everything exactly as your original code continues here) -->
  </div>
</div>

<!-- (ALL YOUR OTHER DAYS REMAIN EXACTLY THE SAME) -->

</div>

<div class="save-toast" id="toast">✓ Saved</div>

<script>
  const STORAGE_KEY = 'workout_weights_v1';

  function toggle(id) {
    document.getElementById(id).classList.toggle('open');
  }

  function loadWeights() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      document.querySelectorAll('.ex-weight').forEach(el => {
        const id = el.dataset.id;
        if (saved[id]) el.textContent = saved[id];
      });
    } catch(e) {}
  }

  let toastTimer;
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
  }

  function saveWeights() {
    try {
      const data = {};
      document.querySelectorAll('.ex-weight').forEach(el => {
        data[el.dataset.id] = el.textContent.trim();
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      showToast();
    } catch(e) {}
  }

  let debounce;
  document.querySelectorAll('.ex-weight').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
    el.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(saveWeights, 600);
    });
    el.addEventListener('blur', saveWeights);
    el.addEventListener('click', e => e.stopPropagation());
  });

  loadWeights();

  // =====================
  // BODYWEIGHT TRACKER
  // =====================
  const BW_KEY = "bodyweight_history_v1";

  function getBWData() {
    return JSON.parse(localStorage.getItem(BW_KEY) || "[]");
  }

  function saveBWData(data) {
    localStorage.setItem(BW_KEY, JSON.stringify(data));
  }

  function renderBW() {
    const list = document.getElementById("bwList");
    if (!list) return;

    const data = getBWData();
    list.innerHTML = "";

    data.slice().reverse().forEach(entry => {
      const li = document.createElement("li");
      li.textContent = `${entry.date} — ${entry.weight} lb`;
      list.appendChild(li);
    });
  }

  function addWeight() {
    const input = document.getElementById("bwInput");
    const value = input.value.trim();
    if (!value) return;

    const data = getBWData();

    data.push({
      weight: value,
      date: new Date().toLocaleDateString()
    });

    saveBWData(data);
    input.value = "";
    renderBW();
  }

  renderBW();
</script>

</body>
</html>
